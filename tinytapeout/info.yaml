# Tiny Tapeout project information
project:
  title:        "LightRail NCE Mini Compute Unit"
  author:       "LightRail AI Labs"
  discord:      ""
  description:  "8-bit MAC engine with ReLU activation — core compute cell of the Neural Compute Engine"
  language:     "Verilog"
  clock_hz:     50000000  # 50 MHz

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_lightrail_nce"

  # List your project's source files here.
  source_files:
    - "project.v"

# The pinout of your project.
pinout:
  # Inputs
  ui[0]: "data_in[0]"
  ui[1]: "data_in[1]"
  ui[2]: "data_in[2]"
  ui[3]: "data_in[3]"
  ui[4]: "data_in[4]"
  ui[5]: "data_in[5]"
  ui[6]: "data_in[6]"
  ui[7]: "data_in[7]"

  # Outputs
  uo[0]: "data_out[0]"
  uo[1]: "data_out[1]"
  uo[2]: "data_out[2]"
  uo[3]: "data_out[3]"
  uo[4]: "data_out[4]"
  uo[5]: "data_out[5]"
  uo[6]: "data_out[6]"
  uo[7]: "data_out[7]"

  # Bidirectional pins
  uio[0]: "opcode[0]"
  uio[1]: "opcode[1]"
  uio[2]: "acc_sel"
  uio[3]: "shift[0]"
  uio[4]: "shift[1]"
  uio[5]: "shift[2]"
  uio[6]: "unused"
  uio[7]: "unused"

# Do not change!
yaml_version: 6
